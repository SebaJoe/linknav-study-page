<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Landing Page</title>
    <style>
      :root {
        --bg: #f1f8f4;
        --surface: #ffffff;
        --ink: #13222f;
        --muted: #5b6f82;
        --brand: #1a8f5f;
        --brand-hover: #126846;
        --border: #cfe3d8;
        --accent-green: #d7efe3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f9fbfd 0%, var(--bg) 100%);
      }

      .container {
        width: min(900px, 92vw);
        margin: 2rem auto 3rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 24, 44, 0.08);
        padding: 1rem 1rem 1.5rem;
      }

      .page-title {
        margin: 0 0 1.1rem;
        color: #0f6142;
        text-align: center;
      }

      .video-title {
        margin: 0 0 1.1rem;
        color: #1d2f3f;
        text-align: center;
      }

      .video-wrap {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #bdd9ca;
        background: #000;
        box-shadow: 0 0 0 6px var(--accent-green);
      }

      video {
        display: block;
        width: 100%;
        height: auto;
      }

      #content {
        margin: 1.25rem 0;
        line-height: 1.6;
        color: #1a2c3e;
      }

      #content h1,
      #content h2,
      #content h3 {
        line-height: 1.25;
        margin-top: 1.4rem;
        margin-bottom: 0.5rem;
      }

      #content p {
        margin: 0.7rem 0;
      }

      #content ul,
      #content ol {
        margin: 0.6rem 0 0.8rem 1.25rem;
      }

      .consent {
        border-top: 1px solid var(--border);
        padding-top: 1rem;
        text-align: center;
      }

      .consent label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        font-weight: 600;
      }

      .consent input[type="checkbox"] {
        margin-top: 0;
        transform: scale(1.2);
      }

      #revealedLinks {
        margin-top: 0.9rem;
        display: none;
        text-align: center;
      }

      #revealedLinks.visible {
        display: block;
        animation: fadeIn 0.25s ease;
      }

      #revealedLinks a {
        display: inline-block;
        margin-right: 0.75rem;
        margin-bottom: 0.5rem;
        padding: 0.55rem 0.9rem;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        background: var(--brand);
      }

      #revealedLinks a:hover {
        background: var(--brand-hover);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(2px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1 class="page-title">LinkNav Study Page</h1>
      <h2 class="video-title">LinkNav Demo</h2>
      <div class="video-wrap">
        <video controls preload="metadata">
          <source src="linknav_demo_for_study.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <section id="content" aria-live="polite">
        Loading content...
      </section>

      <section class="consent">
        <label for="agreeCheckbox">
          <input id="agreeCheckbox" type="checkbox" />
          Have read the text above and watched the video?
        </label>

        <div id="revealedLinks">
          <a id="linkNavInterfaceLink" href="https://linknav.netlify.app" target="_blank" rel="noopener noreferrer">LinkNav Interface</a>
          <a href="https://forms.gle/jpm2yZWWTJibfuMH6" target="_blank" rel="noopener noreferrer">Post-Reading Questionnaire</a>
        </div>

      </section>
    </main>

    <script>
      const markdownPath = "content.md";
      // For GitHub project pages, set this to "/<repo-name>/" (example: "/linknav-study-page/").
      // For user/org pages or custom domains, keep "/".
      const siteBasePath = "/";

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function parseInline(markdown) {
        let text = escapeHtml(markdown);
        text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
        text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
        text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        return text;
      }

      function markdownToHtml(md) {
        const lines = md.replace(/\r\n/g, "\n").split("\n");
        const out = [];
        let inUl = false;
        let inOl = false;

        const closeLists = () => {
          if (inUl) {
            out.push("</ul>");
            inUl = false;
          }
          if (inOl) {
            out.push("</ol>");
            inOl = false;
          }
        };

        for (const rawLine of lines) {
          const line = rawLine.trim();

          if (!line) {
            closeLists();
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.*)$/);
          if (heading) {
            closeLists();
            const level = heading[1].length;
            out.push(`<h${level}>${parseInline(heading[2])}</h${level}>`);
            continue;
          }

          const ulItem = line.match(/^[-*]\s+(.*)$/);
          if (ulItem) {
            if (inOl) {
              out.push("</ol>");
              inOl = false;
            }
            if (!inUl) {
              out.push("<ul>");
              inUl = true;
            }
            out.push(`<li>${parseInline(ulItem[1])}</li>`);
            continue;
          }

          const olItem = line.match(/^\d+\.\s+(.*)$/);
          if (olItem) {
            if (inUl) {
              out.push("</ul>");
              inUl = false;
            }
            if (!inOl) {
              out.push("<ol>");
              inOl = true;
            }
            out.push(`<li>${parseInline(olItem[1])}</li>`);
            continue;
          }

          closeLists();
          out.push(`<p>${parseInline(line)}</p>`);
        }

        closeLists();
        return out.join("\n");
      }

      async function loadContent() {
        const contentEl = document.getElementById("content");

        try {
          const response = await fetch(markdownPath, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const text = await response.text();
          contentEl.innerHTML = markdownToHtml(text);
        } catch (error) {
          contentEl.innerHTML =
            "<p><strong>Could not load content.md.</strong></p><p>Edit or add <code>content.md</code> in this same folder.</p>";
          console.error(error);
        }
      }

      function getPathVariable() {
        const normalizedBasePath = siteBasePath === "/"
          ? "/"
          : `/${siteBasePath.replace(/^\/+|\/+$/g, "")}/`;
        let path = window.location.pathname;

        if (normalizedBasePath !== "/" && path.startsWith(normalizedBasePath)) {
          path = path.slice(normalizedBasePath.length - 1);
        }

        const segments = path
          .split("/")
          .filter(Boolean)
          .filter((segment) => !segment.endsWith(".html"));

        if (segments.length === 0) {
          return "";
        }

        return segments[segments.length - 1];
      }

      function applyPathVariableToLinkNavLink() {
        const link = document.getElementById("linkNavInterfaceLink");
        if (!link) {
          return;
        }

        const pathVariable = getPathVariable();
        if (!pathVariable) {
          return;
        }

        const linkUrl = new URL(link.getAttribute("href"), window.location.href);
        const basePath = linkUrl.pathname.replace(/\/$/, "");
        linkUrl.pathname = `${basePath}/${encodeURIComponent(pathVariable)}`;
        link.href = linkUrl.toString();
      }

      const agreeCheckbox = document.getElementById("agreeCheckbox");
      const revealedLinks = document.getElementById("revealedLinks");

      agreeCheckbox.addEventListener("change", () => {
        revealedLinks.classList.toggle("visible", agreeCheckbox.checked);
      });

      applyPathVariableToLinkNavLink();
      loadContent();
    </script>
  </body>
</html>
